name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install system dependencies
        run: sudo apt-get install -y libfuse2 fakeroot binutils

      - name: Install appimagetool
        run: |
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage \
            -O /usr/local/bin/appimagetool
          chmod +x /usr/local/bin/appimagetool

      - name: Write local.properties
        run: |
          echo "anilist.clientId=${{ secrets.ANILIST_CLIENT_ID }}" >> local.properties
          echo "anilist.clientSecret=${{ secrets.ANILIST_CLIENT_SECRET }}" >> local.properties

      - name: Build AppImage
        run: ./gradlew packageAppImageToDir --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: build/appimage/*.AppImage

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Write local.properties
        shell: pwsh
        run: |
          Add-Content local.properties "anilist.clientId=${{ secrets.ANILIST_CLIENT_ID }}"
          Add-Content local.properties "anilist.clientSecret=${{ secrets.ANILIST_CLIENT_SECRET }}"

      - name: Build Windows MSI
        run: ./gradlew packageMsi --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: build/compose/binaries/main/msi/*.msi

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Write local.properties
        run: |
          echo "anilist.clientId=${{ secrets.ANILIST_CLIENT_ID }}" >> local.properties
          echo "anilist.clientSecret=${{ secrets.ANILIST_CLIENT_SECRET }}" >> local.properties

      - name: Build macOS dmg
        run: ./gradlew packageDmg --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: build/compose/binaries/main/dmg/*.dmg

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/linux-appimage/*.AppImage
            artifacts/windows-msi/*.msi
            artifacts/macos-dmg/*.dmg
          generate_release_notes: true